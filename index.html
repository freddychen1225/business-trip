<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>差旅費申請表 - 久塑有限公司</title>
    
    <!-- html2pdf CDN（已移除 integrity 避免載入問題） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --color-background: #fcfcf9;
            --color-surface: #fffffd;
            --color-text: #134252;
            --color-border: rgba(94, 82, 64, 0.2);
            --color-primary: #21808d;
            --color-primary-hover: #1d7480;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Microsoft JhengHei', '微軟正黑體', Arial, sans-serif;
            margin: 0; padding: 20px;
            background: var(--color-background);
            color: var(--color-text);
        }

        .container {
            max-width: 900px; margin: 0 auto;
            background: var(--color-surface);
            padding: 30px; border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.04);
        }

        h1 {
            text-align: center; color: var(--color-text);
            margin-bottom: 30px; font-size: 24px;
        }

        .form-group { margin-bottom: 20px; }
        label {
            display: block; margin-bottom: 8px;
            font-weight: 500; font-size: 14px;
        }
        input, textarea, select {
            width: 100%; padding: 10px 12px;
            border: 1px solid var(--color-border);
            border-radius: 8px; font-size: 14px;
            font-family: inherit; background: var(--color-surface);
            color: var(--color-text);
        }
        input:focus, textarea:focus, select:focus {
            outline: 2px solid var(--color-primary);
            border-color: var(--color-primary);
        }

        .row { display: flex; gap: 15px; }
        .row .form-group { flex: 1; }

        .trip-item {
            background: rgba(94, 82, 64, 0.05);
            padding: 15px; border-radius: 8px;
            margin-bottom: 15px; border: 1px solid var(--color-border);
        }
        .trip-item-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 10px;
        }
        .trip-item-title { font-weight: 600; font-size: 14px; }

        .btn {
            padding: 10px 20px; border: none;
            border-radius: 8px; font-size: 14px;
            font-weight: 500; cursor: pointer;
            transition: all 0.25s;
        }
        .btn-primary { background: var(--color-primary); color: white; }
        .btn-primary:hover { background: var(--color-primary-hover); }
        .btn-secondary {
            background: rgba(94, 82, 64, 0.12);
            color: var(--color-text);
        }
        .btn-secondary:hover { background: rgba(94, 82, 64, 0.2); }
        .btn-danger {
            background: #c0152f; color: white;
            padding: 6px 12px; font-size: 13px;
        }
        .btn-danger:hover { background: #a0122a; }
        .btn-add { width: 100%; margin-top: 10px; }

        .actions { display: flex; gap: 15px; margin-top: 30px; }

        .summary {
            background: rgba(33, 128, 141, 0.08);
            padding: 20px; border-radius: 8px; margin-top: 20px;
        }
        .summary-row {
            display: flex; justify-content: space-between;
            padding: 8px 0; font-size: 15px;
        }
        .summary-row.total {
            font-weight: 600; font-size: 18px;
            border-top: 2px solid var(--color-primary);
            margin-top: 10px; padding-top: 15px;
        }

        #preview {
            margin-top: 30px; padding: 30px;
            background: white; border: 1px solid var(--color-border);
            border-radius: 8px; display: none;
        }
        #preview.show { display: block; }

        .preview-table {
            width: 100%; border-collapse: collapse;
            font-size: 12px; font-family: 'Microsoft JhengHei', sans-serif;
            table-layout: fixed;
        }
        .preview-table td {
            border: 1px solid #000; padding: 6px;
            word-break: break-all;
        }
        .preview-company {
            text-align: center; font-size: 20px;
            font-weight: bold; padding: 10px;
        }
        .preview-header {
            text-align: center; font-size: 18px;
            font-weight: bold; padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>久塑有限公司 - 差旅費申請表</h1>

        <div class="form-group">
            <label>姓名</label>
            <input type="text" id="name" placeholder="請輸入申請人姓名">
        </div>

        <div class="row">
            <div class="form-group">
                <label>申請日期（民國年）</label>
                <input type="number" id="applyYear" placeholder="例：115">
            </div>
            <div class="form-group">
                <label>月</label>
                <input type="number" id="applyMonth" min="1" max="12" placeholder="1-12">
            </div>
            <div class="form-group">
                <label>日</label>
                <input type="number" id="applyDay" min="1" max="31" placeholder="1-31">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>出差開始日期（民國年）</label>
                <input type="number" id="startYear" placeholder="例：115">
            </div>
            <div class="form-group">
                <label>月</label>
                <input type="number" id="startMonth" min="1" max="12" placeholder="1-12">
            </div>
            <div class="form-group">
                <label>日</label>
                <input type="number" id="startDay" min="1" max="31" placeholder="1-31">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>出差結束日期（民國年）</label>
                <input type="number" id="endYear" placeholder="例：115">
            </div>
            <div class="form-group">
                <label>月</label>
                <input type="number" id="endMonth" min="1" max="12" placeholder="1-12">
            </div>
            <div class="form-group">
                <label>日</label>
                <input type="number" id="endDay" min="1" max="31" placeholder="1-31">
            </div>
        </div>

        <div class="form-group">
            <label>出差事由</label>
            <textarea id="reason" rows="2" placeholder="請輸入出差事由"></textarea>
        </div>

        <h3 style="margin-top: 30px; margin-bottom: 15px;">差旅明細</h3>
        <div id="tripItems"></div>
        <button class="btn btn-secondary btn-add" onclick="addTripItem()">+ 新增差旅明細</button>

        <div class="summary">
            <div class="summary-row">
                <span>交通費小計：</span>
                <span id="transportTotal">0</span>
            </div>
            <div class="summary-row">
                <span>膳雜費小計：</span>
                <span id="mealTotal">0</span>
            </div>
            <div class="summary-row">
                <span>其他費用小計：</span>
                <span id="otherTotal">0</span>
            </div>
            <div class="summary-row total">
                <span>金額總合計：</span>
                <span id="grandTotal">0</span>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-secondary" onclick="previewPDF()">預覽表格</button>
            <button class="btn btn-primary" onclick="generatePDF()">下載 PDF</button>
        </div>

        <div id="preview"></div>
    </div>

    <script>
        let tripItemCount = 0;

        function addTripItem() {
            tripItemCount++;
            const container = document.getElementById('tripItems');
            const itemDiv = document.createElement('div');
            itemDiv.className = 'trip-item';
            itemDiv.id = `trip-${tripItemCount}`;
            itemDiv.innerHTML = `
                <div class="trip-item-header">
                    <div class="trip-item-title">明細 ${tripItemCount}</div>
                    <button class="btn btn-danger" onclick="removeTripItem(${tripItemCount})">刪除</button>
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>月</label>
                        <input type="number" class="trip-month" min="1" max="12" onchange="calculateTotals()">
                    </div>
                    <div class="form-group">
                        <label>日</label>
                        <input type="number" class="trip-day" min="1" max="31" onchange="calculateTotals()">
                    </div>
                    <div class="form-group">
                        <label>出發地</label>
                        <input type="text" class="trip-from" onchange="calculateTotals()">
                    </div>
                    <div class="form-group">
                        <label>目的地</label>
                        <input type="text" class="trip-to" onchange="calculateTotals()">
                    </div>
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>交通費-公里數</label>
                        <input type="number" class="trip-km" min="0" oninput="onKmChange(this)">
                    </div>
                    <div class="form-group">
                        <label>交通費-金額</label>
                        <input type="number" class="trip-transport" min="0" readonly>
                    </div>
                    <div class="form-group">
                        <label>膳雜費-金額</label>
                        <input type="number" class="trip-meal" min="0" onchange="calculateTotals()">
                    </div>
                    <div class="form-group">
                        <label>其他-品項</label>
                        <input type="text" class="trip-other-item" onchange="calculateTotals()">
                    </div>
                    <div class="form-group">
                        <label>其他-金額</label>
                        <input type="number" class="trip-other-amount" min="0" onchange="calculateTotals()">
                    </div>
                </div>
            `;
            container.appendChild(itemDiv);
        }

        function removeTripItem(id) {
            const item = document.getElementById(`trip-${id}`);
            if (item) {
                item.remove();
                calculateTotals();
            }
        }

        function onKmChange(input) {
            const item = input.closest('.trip-item');
            const km = parseFloat(input.value || 0);
            const amount = km * 7;
            const transportInput = item.querySelector('.trip-transport');
            transportInput.value = amount ? amount : '';
            calculateTotals();
        }

        function calculateTotals() {
            const items = document.querySelectorAll('.trip-item');
            let transportTotal = 0, mealTotal = 0, otherTotal = 0;

            items.forEach(item => {
                const transport = parseFloat(item.querySelector('.trip-transport')?.value || 0);
                const meal = parseFloat(item.querySelector('.trip-meal')?.value || 0);
                const other = parseFloat(item.querySelector('.trip-other-amount')?.value || 0);

                transportTotal += transport;
                mealTotal += meal;
                otherTotal += other;
            });

            const grandTotal = transportTotal + mealTotal + otherTotal;
            document.getElementById('transportTotal').textContent = transportTotal;
            document.getElementById('mealTotal').textContent = mealTotal;
            document.getElementById('otherTotal').textContent = otherTotal;
            document.getElementById('grandTotal').textContent = grandTotal;
        }

        function getTripData() {
            const items = document.querySelectorAll('.trip-item');
            const tripData = [];
            items.forEach(item => {
                const month = item.querySelector('.trip-month')?.value || '';
                const day = item.querySelector('.trip-day')?.value || '';
                const from = item.querySelector('.trip-from')?.value || '';
                const to = item.querySelector('.trip-to')?.value || '';
                const km = item.querySelector('.trip-km')?.value || '';
                const transport = item.querySelector('.trip-transport')?.value || '';
                const meal = item.querySelector('.trip-meal')?.value || '';
                const otherItem = item.querySelector('.trip-other-item')?.value || '';
                const otherAmount = item.querySelector('.trip-other-amount')?.value || '';

                tripData.push({ month, day, from, to, km, transport, meal, otherItem, otherAmount });
            });
            return tripData;
        }

        function calculateDays() {
            const startYear = parseInt(document.getElementById('startYear').value || 0);
            const startMonth = parseInt(document.getElementById('startMonth').value || 0);
            const startDay = parseInt(document.getElementById('startDay').value || 0);
            const endYear = parseInt(document.getElementById('endYear').value || 0);
            const endMonth = parseInt(document.getElementById('endMonth').value || 0);
            const endDay = parseInt(document.getElementById('endDay').value || 0);

            if (!startYear || !startMonth || !startDay || !endYear || !endMonth || !endDay) {
                return 0;
            }

            const start = new Date(startYear + 1911, startMonth - 1, startDay);
            const end = new Date(endYear + 1911, endMonth - 1, endDay);
            const diffTime = Math.abs(end - start);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
            return diffDays;
        }

        function previewPDF() {
            const preview = document.getElementById('preview');
            const tripData = getTripData();
            const days = calculateDays();

            const name = document.getElementById('name').value || '';
            const applyYear = document.getElementById('applyYear').value || '';
            const applyMonth = document.getElementById('applyMonth').value || '';
            const applyDay = document.getElementById('applyDay').value || '';
            const startYear = document.getElementById('startYear').value || '';
            const startMonth = document.getElementById('startMonth').value || '';
            const startDay = document.getElementById('startDay').value || '';
            const endYear = document.getElementById('endYear').value || '';
            const endMonth = document.getElementById('endMonth').value || '';
            const endDay = document.getElementById('endDay').value || '';
            const reason = document.getElementById('reason').value || '';

            const transportTotal = document.getElementById('transportTotal').textContent;
            const mealTotal = document.getElementById('mealTotal').textContent;
            const otherTotal = document.getElementById('otherTotal').textContent;
            const grandTotal = document.getElementById('grandTotal').textContent;

            let tripRows = '';
            tripData.forEach(item => {
                tripRows += `
                    <tr>
                        <td style="text-align:center;">${item.month}</td>
                        <td style="text-align:center;">${item.day}</td>
                        <td style="text-align:center;">${item.from}</td>
                        <td style="text-align:center;">${item.to}</td>
                        <td style="text-align:center;">${item.km}</td>
                        <td style="text-align:center;">${item.transport}</td>
                        <td style="text-align:center;">${item.meal}</td>
                        <td style="text-align:center;">${item.otherItem}</td>
                        <td style="text-align:center;">${item.otherAmount}</td>
                    </tr>
                `;
            });

            preview.innerHTML = `
                <table class="preview-table">
                    <tr><td colspan="9" class="preview-company">久塑有限公司</td></tr>
                    <tr><td colspan="9" class="preview-header">差旅費申請表</td></tr>
                    <tr>
                        <td colspan="2" rowspan="1" style="text-align:center;border-top:2px solid #000;border-left:2px solid #000;border-right:1px solid #000;">姓名</td>
                        <td colspan="3" style="border-top:2px solid #000;">${name}</td>
                        <td colspan="2" rowspan="1" style="text-align:center;border-top:2px solid #000;">申請日期</td>
                        <td colspan="2" style="border-top:2px solid #000;">　${applyYear}年　${applyMonth}月　${applyDay}日</td>
                    </tr>
                    <tr>
                        <td colspan="2" style="text-align:center;border-left:2px solid #000;">出差日期</td>
                        <td colspan="7">自　${startYear}年　${startMonth}月　${startDay}日　至　${endYear}年　${endMonth}月　${endDay}日　共　${days}　天</td>
                    </tr>
                    <tr>
                        <td colspan="2" style="text-align:center;border-left:2px solid #000;">出差事由</td>
                        <td colspan="7">${reason}</td>
                    </tr>
                    <tr>
                        <td colspan="2" rowspan="2" style="text-align:center;border-left:2px solid #000;">日期</td>
                        <td rowspan="2" style="text-align:center;">出發地</td>
                        <td rowspan="2" style="text-align:center;">目的地</td>
                        <td colspan="2" style="text-align:center;">交通費</td>
                        <td rowspan="2" style="text-align:center;">膳雜費</td>
                        <td colspan="2" style="text-align:center;">其他</td>
                    </tr>
                    <tr>
                        <td style="text-align:center;">公里數</td>
                        <td style="text-align:center;">金額</td>
                        <td style="text-align:center;">品項</td>
                        <td style="text-align:center;">金額</td>
                    </tr>
                    ${tripRows}
                    <tr style="border-top:2px solid #000;">
                        <td colspan="4" style="text-align:right;padding-right:10px;">各品項小計</td>
                        <td colspan="2" style="text-align:right;padding-right:10px;">${transportTotal}</td>
                        <td style="text-align:right;padding-right:10px;">${mealTotal}</td>
                        <td colspan="2" style="text-align:right;padding-right:10px;">${otherTotal}</td>
                    </tr>
                    <tr style="border-top:2px solid #000;">
                        <td colspan="4" style="text-align:right;padding-right:10px;">金額總合計</td>
                        <td colspan="5" style="text-align:right;padding-right:10px;">${grandTotal}</td>
                    </tr>
                    <tr>
                        <td colspan="6"></td>
                        <td colspan="3" style="text-align:right;padding-right:10px;">申請人：${name}</td>
                    </tr>
                </table>
            `;

            preview.classList.add('show');
            preview.scrollIntoView({ behavior: 'smooth' });
        }

        function generatePDF() {
            previewPDF(); // 確保預覽是最新的

            const name = (document.getElementById('name').value || '').trim() || '未命名';
            const startYear = parseInt(document.getElementById('startYear').value || 0);
            const startMonth = parseInt(document.getElementById('startMonth').value || 0);
            const startDay = parseInt(document.getElementById('startDay').value || 0);

            let yyyymmdd = '00000000';
            if (startYear && startMonth && startDay) {
                const adYear = startYear + 1911;
                const mm = String(startMonth).padStart(2, '0');
                const dd = String(startDay).padStart(2, '0');
                yyyymmdd = `${adYear}${mm}${dd}`;
            }
            const fileName = `${yyyymmdd}差旅費申請表${name}.pdf`;

            const element = document.getElementById('preview');

            // 檢查 html2pdf 是否載入成功
            if (typeof html2pdf === 'undefined') {
                alert('PDF 函式庫載入失敗，請重新整理頁面');
                return;
            }

            const opt = {
                margin: [10, 10, 10, 10],
                filename: fileName,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { 
                    scale: 2,
                    useCORS: true,
                    letterRendering: true,
                    allowTaint: true
                },
                jsPDF: { 
                    unit: 'mm', 
                    format: 'a4', 
                    orientation: 'landscape' 
                }
            };

            html2pdf().set(opt).from(element).save();
        }

        // 初始化
        addTripItem();
    </script>
</body>
</html>
