<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>差旅費申請表</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA 設定 -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <meta name="theme-color" content="#ffffff">

  <!-- html2pdf CDN（用來產 PDF） -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"
          integrity="sha512-YcsIPGdhp0uF0Kp0fE4pVkwNDSSSX5QZnIcXtNCmieYwgd0CQpZK0s8AjtKq6HgMHqmpYyqn1bQ5bZPqU5I0hA=="
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <style>
    body {
      font-family: "Noto Sans TC","Microsoft JhengHei",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
      background:#f5f5f5;
      margin:0;
      padding:20px;
    }
    .page {
      width:794px;
      margin:0 auto;
      background:#fff;
      padding:40px 30px;
      box-sizing:border-box;
      box-shadow:0 0 8px rgba(0,0,0,.1);
    }
    h1,h2 { text-align:center; margin:0; }
    h1 { font-size:28px; margin-bottom:4px; }
    h2 { font-size:22px; margin-bottom:20px; }

    table {
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
      font-size:14px;
    }
    td {
      border:1px solid #000;
      padding:4px 6px;
      box-sizing:border-box;
      word-break:break-all;
    }
    .no-border { border:none !important; }
    .text-center { text-align:center; }
    .text-right { text-align:right; }

    input,textarea {
      width:100%;
      border:none;
      outline:none;
      font:inherit;
      padding:0;
      margin:0;
      background:transparent;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance:none;
      margin:0;
    }
    input[type="number"] { -moz-appearance:textfield; }

    .controls {
      margin-top:16px;
      text-align:right;
    }
    button {
      margin-left:8px;
      padding:6px 12px;
      font-size:14px;
      cursor:pointer;
    }

    @media print {
      body { background:#fff; padding:0; }
      .page { box-shadow:none; margin:0; width:100%; padding:20px; }
      .controls { display:none; }
    }
  </style>
</head>
<body>
<div class="page" id="print-area">
  <h1>久塑有限公司</h1>
  <h2>差旅費申請表</h2>

  <table>
    <tr>
      <td class="text-center" style="width:10%;">姓名</td>
      <td style="width:25%;">
        <input id="applicant">
      </td>
      <td class="no-border"></td>
      <td class="text-center" style="width:15%;">申請日期</td>
      <td style="width:25%;" colspan="3">
        民國
        <input id="applyYear" type="number" style="width:40px;"> 年
        <input id="applyMonth" type="number" style="width:28px;"> 月
        <input id="applyDay" type="number" style="width:28px;"> 日
      </td>
    </tr>
    <tr>
      <td class="text-center">出差日期</td>
      <td colspan="6">
        自 民國
        <input id="startYear" type="number" style="width:40px;"> 年
        <input id="startMonth" type="number" style="width:28px;"> 月
        <input id="startDay" type="number" style="width:28px;"> 日
        至 民國
        <input id="endYear" type="number" style="width:40px;"> 年
        <input id="endMonth" type="number" style="width:28px;"> 月
        <input id="endDay" type="number" style="width:28px;"> 日
        共
        <input id="days" type="number" style="width:28px;"> 天
      </td>
    </tr>
    <tr>
      <td class="text-center">出差事由</td>
      <td colspan="6">
        <input id="purpose">
      </td>
    </tr>

    <tr>
      <td class="text-center" rowspan="2" style="width:10%;">日期</td>
      <td class="text-center" rowspan="2" style="width:15%;">出發地</td>
      <td class="text-center" rowspan="2" style="width:15%;">目的地</td>
      <td class="text-center" colspan="2" style="width:25%;">交通費</td>
      <td class="text-center" rowspan="2" style="width:15%;">膳雜費<br>金額</td>
      <td class="text-center" colspan="2" style="width:20%;">其他</td>
    </tr>
    <tr>
      <td class="text-center">公里數</td>
      <td class="text-center">金額</td>
      <td class="text-center">品項</td>
      <td class="text-center">金額</td>
    </tr>

    <tbody id="detail-rows">
    </tbody>

    <tr>
      <td class="text-center" colspan="3">各品項小計</td>
      <td class="text-right" colspan="2" id="transportTotalCell">0</td>
      <td class="text-right" id="mealTotalCell">0</td>
      <td class="text-right" colspan="2" id="otherTotalCell">0</td>
    </tr>
    <tr>
      <td class="text-center" colspan="3">金額總合計</td>
      <td class="text-right" colspan="5" id="grandTotalCell">0</td>
    </tr>
    <tr>
      <td class="no-border" colspan="5"></td>
      <td class="no-border text-right" colspan="2">申請人：</td>
      <td class="text-center">
        <span id="applicantDisplay"></span>
      </td>
    </tr>
  </table>
</div>

<div class="controls">
  <button type="button" onclick="addDetailRow()">新增差旅明細</button>
  <button type="button" onclick="updatePreview()">預覽表格</button>
  <button type="button" onclick="downloadPDF()">下載 PDF</button>
</div>

<script>
  const KM_RATE = 7;

  function createRow() {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="text-center">
        <input type="number" class="input-month" style="width:28px;" placeholder="月">
        /
        <input type="number" class="input-day" style="width:28px;" placeholder="日">
      </td>
      <td><input class="input-from"></td>
      <td><input class="input-to"></td>
      <td><input type="number" class="input-km" oninput="onKmChange(this)"></td>
      <td><input type="number" class="input-transport" readonly></td>
      <td><input type="number" class="input-meal" oninput="recalcTotals()"></td>
      <td><input class="input-other-item"></td>
      <td><input type="number" class="input-other-amount" oninput="recalcTotals()"></td>
    `;
    return tr;
  }

  function addDetailRow() {
    const tbody = document.getElementById('detail-rows');
    tbody.appendChild(createRow());
  }

  function onKmChange(input) {
    const tr = input.closest('tr');
    const km = Number(input.value) || 0;
    const amount = km * KM_RATE;
    const amtInput = tr.querySelector('.input-transport');
    amtInput.value = amount ? amount : '';
    recalcTotals();
  }

  function recalcTotals() {
    let transportTotal = 0;
    let mealTotal = 0;
    let otherTotal = 0;

    document.querySelectorAll('#detail-rows tr').forEach(tr => {
      const tAmt = Number(tr.querySelector('.input-transport').value) || 0;
      const mAmt = Number(tr.querySelector('.input-meal').value) || 0;
      const oAmt = Number(tr.querySelector('.input-other-amount').value) || 0;
      transportTotal += tAmt;
      mealTotal += mAmt;
      otherTotal += oAmt;
    });

    document.getElementById('transportTotalCell').textContent = transportTotal || '';
    document.getElementById('mealTotalCell').textContent = mealTotal || '';
    document.getElementById('otherTotalCell').textContent = otherTotal || '';
    document.getElementById('grandTotalCell').textContent =
      transportTotal + mealTotal + otherTotal || '';
  }

  function updatePreview() {
    document.getElementById('applicantDisplay').textContent =
      document.getElementById('applicant').value || '';
    recalcTotals();
  }

  function formatFileName() {
    const startYear = Number(document.getElementById('startYear').value) || 0; // 民國
    const startMonth = Number(document.getElementById('startMonth').value) || 0;
    const startDay = Number(document.getElementById('startDay').value) || 0;
    const name = (document.getElementById('applicant').value || '').trim() || '未命名';

    const adYear = startYear ? startYear + 1911 : 0;
    const mm = String(startMonth).padStart(2, '0');
    const dd = String(startDay).padStart(2, '0');
    const yyyymmdd = adYear ? `${adYear}${mm}${dd}` : '00000000';

    return `${yyyymmdd}差旅費申請表${name}.pdf`;
  }

  function downloadPDF() {
    updatePreview();
    const fileName = formatFileName();
    const element = document.getElementById('print-area');

    const opt = {
      margin:       10,
      filename:     fileName,
      image:        { type: 'jpeg', quality: 1 },
      html2canvas:  { scale: 2 },
      jsPDF:        { unit: 'pt', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save();
  }

  // 預設兩列
  addDetailRow();
  addDetailRow();

  // 註冊 service worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js');
    });
  }
</script>
</body>
</html>
